kind = "web"
previewPath = "/"
title = "NomadReady"
version = "1.0.0"
id = "artifacts/nomadready"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20546

[services.development]
run = "fuser -k $PORT/tcp 2>/dev/null || true; pnpm --filter @workspace/nomadready run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nomadready", "run", "build" ]
publicDir = "artifacts/nomadready/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20546"
BASE_PATH = "/"
